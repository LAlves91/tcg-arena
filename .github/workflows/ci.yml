name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tcg
          POSTGRES_PASSWORD: tcg
          POSTGRES_DB: tcg_arena
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tcg -d tcg_arena"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://tcg:tcg@localhost:5432/tcg_arena?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Derive nx affected base
        uses: nrwl/nx-set-shas@v4

      - name: Apply database migrations
        run: npx nx run api:db:migrate-deploy

      - name: Generate Prisma client
        run: npx nx run api:db:generate

      - name: Lint
        run: npx nx affected --target=lint --parallel=3

      - name: Typecheck
        run: npx nx affected --target=typecheck --parallel=3

      - name: Test
        run: npx nx affected --target=test --parallel=3 --configuration=ci || npx nx affected --target=test --parallel=3

      - name: Build
        run: npx nx affected --target=build --parallel=2

  commitlint:
    name: Commit lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint commits
        run: npx commitlint --from=${{ github.event.pull_request.base.sha }} --to=${{ github.event.pull_request.head.sha }} --verbose
